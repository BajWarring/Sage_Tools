name: Build APK

on:
  workflow_dispatch: # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (with Gradle Cache)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle' # <--- This enables caching for Gradle!

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20' # <--- Upgraded from 18 to fix "toReversed" error
          # We cannot cache NPM yet because you haven't committed package-lock.json
          # but Gradle caching is the most important one for speed.

      - name: Install Dependencies
        run: npm install

      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SageTools-APK
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 1
