name: Fix Password Mismatch

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-credentials:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Overwrite Gradle Signing Config
        run: |
          cd android/app
          
          # 1. Update Store Password (handle single OR double quotes)
          sed -i "s/storePassword ['\"]android['\"]/storePassword 'sage123'/g" build.gradle
          
          # 2. Update Key Password (handle single OR double quotes)
          sed -i "s/keyPassword ['\"]android['\"]/keyPassword 'sage123'/g" build.gradle
          
          # 3. Update Key Alias
          sed -i "s/keyAlias ['\"]androiddebugkey['\"]/keyAlias 'sage-key'/g" build.gradle
          
          # 4. Ensure it points to release.keystore
          sed -i "s/debug.keystore/release.keystore/g" build.gradle

      - name: Regenerate Keystore (Just to be 100% sure)
        run: |
          cd android/app
          rm -f release.keystore
          # Generate new key with 'sage123' to match the gradle file above
          keytool -genkeypair -v -storetype PKCS12 -keystore release.keystore -alias sage-key -keyalg RSA -keysize 2048 -validity 10000 -storepass sage123 -keypass sage123 -dname "CN=Sage Tools, OU=Mobile, O=Sage, L=City, ST=State, C=US"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add android/app/build.gradle android/app/release.keystore
          git commit -m "Fix: Sync Gradle passwords with Keystore"
          git push
