name: Keystore

on:
  workflow_dispatch:

permissions:
  contents: write # Required to push the key file to your repo

jobs:
  fix-key:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Generate and Force-Push Key
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          cd android/app
          
          # 1. Generate the key again
          keytool -genkeypair -v -storetype PKCS12 -keystore release.keystore -alias sage-key -keyalg RSA -keysize 2048 -validity 10000 -storepass sage123 -keypass sage123 -dname "CN=Sage Tools, OU=Mobile, O=Sage, L=City, ST=State, C=US"
          
          # 2. FORCE add it (The -f flag overrides .gitignore)
          git add -f release.keystore
          
          # 3. Commit and Push
          git commit -m "Fix: Force add release.keystore to repo"
          git push
